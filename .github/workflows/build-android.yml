name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          echo '{
            "Capacitor": {
              "appId": "com.fisaslivica.app",
              "appName": "Fisa Silvica",
              "scheme": "https",
              "hideLogs": false
            },
            "PluginHeaders": {}
          }' > android/app/src/main/assets/capacitor.config.json

      - name: Create missing cordova variables file
        run: |
          mkdir -p android/capacitor-cordova-android-plugins
          echo '' > android/capacitor-cordova-android-plugins/cordova.variables.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fisa-silvica-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
