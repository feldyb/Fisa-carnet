name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: cat dist/index.html
      - run: mkdir -p android/app/src/main/assets/public && cp -r dist/. android/app/src/main/assets/public/
      - run: mkdir -p android/capacitor-cordova-android-plugins && echo '' > android/capacitor-cordova-android-plugins/cordova.variables.gradle
      - run: echo '{"Capacitor":{"appId":"com.fisaslivica.app","appName":"Fisa Silvica","scheme":"https"},"PluginHeaders":{}}' > android/app/src/main/assets/capacitor.config.json && echo '[]' > android/app/src/main/assets/capacitor.plugins.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x android/gradlew && cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: fisa-silvica-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
